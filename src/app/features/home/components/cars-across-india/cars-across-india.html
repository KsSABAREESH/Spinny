<div class="w-full flex justify-center">
  <div class="w-[97%]">
    <!-- TITLE -->
    <div class="flex items-center justify-center gap-4 mb-12">
      <div class="flex-1 h-[1px] bg-gradient-to-l from-gray-300 to-transparent"></div>
      <h2 class="text-2xl font-semibold text-[rgb(46,5,78)] whitespace-nowrap">
        Cars across India
      </h2>

      <div class="flex-1 h-[1px] bg-gradient-to-r from-gray-300 to-transparent"></div>
    </div>

    <!-- SLIDER WRAPPER -->
    <div class="relative">
      <!-- LEFT ARROW -->
      <button
        *ngIf="!isAtStart"
        (click)="scrollLeft()"
        class="absolute left-2 top-1/2 -translate-y-1/2 z-10 w-10 h-10 flex items-center justify-center border border-white rounded-full text-[rgb(78,8,131)] text-2xl bg-transparent hover:scale-110 transition"
      >
        ‹
      </button>

      <!-- RIGHT ARROW -->
      <button
        *ngIf="!isAtEnd"
        (click)="scrollRight()"
        class="absolute right-2 top-1/2 -translate-y-1/2 z-10 w-10 h-10 flex items-center justify-center border border-white rounded-full text-[rgb(78,8,131)] text-2xl bg-transparent hover:scale-110 transition"
      >
        ›
      </button>

      <!-- SCROLL CONTAINER -->
      <div #scrollContainer class="flex gap-4 overflow-x-auto scroll-smooth no-scrollbar">
        <!-- CARD -->
        <div
          *ngFor="let city of cities"
          class="min-w-[298px] h-[344px] rounded-2xl flex flex-col items-center justify-between p-6 text-white"
          [style.background]="city.color"
        >
          <!-- CITY NAME -->
          <h3 class="font-semibold text-lg">
            {{ city.name }}
          </h3>

          <!-- IMAGE -->
          <div class="w-40 h-40 rotate-45 overflow-hidden rounded-xl">
            <img [src]="city.img" class="w-full h-full object-cover -rotate-45" />
          </div>

          <!-- INFO -->
          <p class="text-md">
            <span class="font-semibold">{{ city.hubs }}</span>
            <span class="mx-2">•</span>
            <span>{{ city.cars }}</span>
          </p>
        </div>
      </div>
    </div>

    <!-- BUTTON -->
    <div class="flex justify-center mt-12">
      <button
        class="border border-[rgb(99,0,163)] text-[rgb(99,0,163)] px-12 py-3 rounded-xl text-sm font-medium hover:bg-purple-50 transition"
      >
        View all locations
      </button>
    </div>
  </div>
</div>
