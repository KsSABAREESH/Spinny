<div class="w-full bg-white py-20 flex justify-center">
  <div class="w-[80%] text-center">

    <!-- TITLE -->
    <h2 class="text-xl font-semibold text-[rgb(46,5,78)] mb-3">
      How Spinny® Works
    </h2>

    <p class="text-xs text-[rgb(46,5,78)] mb-16">
      You won’t just love our cars, you’ll love the way you buy them.
    </p>

    <!-- STEPS -->
    <div class="grid grid-cols-3 gap-10 items-start">

      <div *ngFor="let step of steps" class="flex flex-col items-center">

        <!-- IMAGE -->
        <img
          [src]="step.img"
          class="h-35 object-contain mb-6"
        />

        <!-- TITLE -->
        <h3 class="text-[rgb(46,5,78)] font-semibold text-sm mb-2 text-center">
          {{ step.title }}
        </h3>

        <!-- DESC -->
        <p class="text-xs text-gray-500 text-center">
          {{ step.desc }}
        </p>

      </div>

    </div>

    <!-- BUTTON -->
    <div class="mt-14 flex flex-col items-center gap-4">

      <button
        class="bg-[#6300a3] text-white px-8 py-3 rounded-lg flex items-center gap-3 text-xs font-medium hover:opacity-90 transition"
      >
        Watch how it works

        <!-- Play Icon -->
        <span class="bg-white text-[#6300a3] rounded-full w-5 h-5 flex items-center justify-center text-xs">
          ▶
        </span>
      </button>

      <!-- LEARN MORE -->
      <button class="text-[#6300a3] text-xs font-medium">
        Learn more
      </button>

    </div>

  </div>
</div>
